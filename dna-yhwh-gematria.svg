<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img">
  <title>YHWH gematria claim versus measured B-DNA structure</title>
  <rect width="960" height="440" fill="#FFFFFF"/>
  <rect x="12" y="12" width="936" height="416" rx="8" fill="#EEF4F7" stroke="#172A36" stroke-width="1.5"/>
  <text x="480" y="40" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="#172A36">The YHWH claim (~1986) beside what B-DNA actually measures</text>
  <line x1="320" y1="52" x2="320" y2="404" stroke="#172A36" stroke-width="1" opacity="0.2"/>
  <line x1="640" y1="52" x2="640" y2="404" stroke="#172A36" stroke-width="1" opacity="0.2"/>

  <text x="160" y="72" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#8B6914">Rubinstein claim · ~1986</text>
  <text x="160" y="110" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700" fill="#8B6914">10 · 5 · 6 · 5</text>
  <text x="160" y="128" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">yod · he · vav · he</text>
  <text x="160" y="142" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#172A36">יהוה · YHWH</text>
  <text x="160" y="168" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#47545B">said to repeat in "sulfur bridges"</text>
  <text x="160" y="182" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#8B4513">debunked: H-bonds, not sulfur</text>

  <text x="480" y="72" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#5B8DB8">Canonical B-DNA · measured</text>
  <text x="480" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">A-T pair: 2 hydrogen bonds</text>
  <text x="480" y="122" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">G-C pair: 3 hydrogen bonds</text>
  <text x="480" y="148" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">10 base pairs per 360° turn</text>
  <text x="480" y="162" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">~36° rotation per base</text>
  <text x="480" y="176" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">pitch ~34Å · width ~21Å</text>
  <text x="480" y="200" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#5B8DB8">Watson &amp; Crick 1953 · Larsen 2021</text>

  <text x="800" y="72" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#172A36">What still stopped me</text>
  <text x="800" y="108" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700" fill="#8B6914">10</text>
  <text x="800" y="124" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#47545B">bases per turn · yod = 10</text>
  <text x="800" y="148" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">decagon tent · ten sides</text>
  <text x="800" y="162" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">4 nucleotides · 4-letter name</text>
  <text x="800" y="176" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">ATCG text in every cell</text>
  <text x="800" y="200" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#8B6914">Sinai ~1400 BC precedes lab</text>

  <text x="480" y="250" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#172A36">Gematria match on 10-5-6-5: not supported by bond chemistry</text>
  <text x="480" y="266" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#172A36">Structural ten-fold symmetry: supported in B-DNA and Tabernacle models</text>
  <text x="480" y="290" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#47545B">Sources: Weizmann skeptics · Israel365 debunk · Larsen Symmetry 2021 · Project314</text>
</svg>