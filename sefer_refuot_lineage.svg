<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 900 800" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Transmission of Noah's Book of Remedies</title>
  <desc>Flow diagram showing the Sefer Refuot passing through the Tower of Babel dispersion into Ayurveda in India, and through the lineage of Shem into the Hebrew Sefer Asaph.</desc>
  <rect width="900" height="800" fill="#FFFFFF"/>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#172A36"/>
    </marker>
  </defs>

  <rect x="280" y="40" width="340" height="104" rx="4" fill="#EAF1F4" stroke="#172A36" stroke-width="1.6"/>
  <text x="450" y="74" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="21" font-weight="600" letter-spacing="2" fill="#172A36">SEFER REFUOT</text>
  <text x="450" y="97" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12.5" fill="#47545B">Noah's Book of Remedies, taught by the angel Raphael</text>
  <text x="450" y="115" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11" letter-spacing="1.5" fill="#778187">JUBILEES 10:10-14</text>
  <text x="450" y="133" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#172A36">~2400 BC · POST-FLOOD GENERATION</text>

  <line x1="450" y1="144" x2="450" y2="192" stroke="#172A36" stroke-width="1.6"/>
  <line x1="220" y1="192" x2="680" y2="192" stroke="#172A36" stroke-width="1.6"/>
  <line x1="220" y1="192" x2="220" y2="234" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="680" y1="192" x2="680" y2="234" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="80" y="240" width="280" height="96" rx="4" fill="#FFFFFF" stroke="#172A36" stroke-width="1.3"/>
  <text x="220" y="272" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="1.5" fill="#0E0E0E">TOWER OF BABEL</text>
  <text x="220" y="293" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">One language becomes seventy,</text>
  <text x="220" y="310" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">the nations copy what they can carry</text>
  <text x="220" y="328" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#172A36">~2200 BC · NATIONS SCATTER</text>

  <rect x="540" y="240" width="280" height="96" rx="4" fill="#FFFFFF" stroke="#172A36" stroke-width="1.3"/>
  <text x="680" y="272" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="1.5" fill="#0E0E0E">LINEAGE OF SHEM</text>
  <text x="680" y="293" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">The book given to Noah's eldest son,</text>
  <text x="680" y="310" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">guarded within Israel</text>
  <text x="680" y="328" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#172A36">FROM ~2400 BC · SHEM LINE</text>

  <line x1="220" y1="336" x2="220" y2="392" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="680" y1="336" x2="680" y2="392" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="80" y="398" width="280" height="84" rx="4" fill="#FFFFFF" stroke="#172A36" stroke-width="1.3"/>
  <text x="220" y="426" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="14.5" font-weight="500" fill="#0E0E0E">The sages of India copy it</text>
  <text x="220" y="448" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11.5" fill="#47545B">and they translated it into their own language</text>
  <text x="220" y="468" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#172A36">AFTER BABEL · INTO SANSKRIT</text>

  <rect x="540" y="398" width="280" height="84" rx="4" fill="#FFFFFF" stroke="#172A36" stroke-width="1.3"/>
  <text x="680" y="426" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="14.5" font-weight="500" fill="#0E0E0E">Copied and recompiled</text>
  <text x="680" y="448" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11.5" fill="#47545B">by physicians in the Hebrew tradition</text>
  <text x="680" y="468" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#172A36">MOSAIC ERA ~1400 BC ONWARD</text>

  <line x1="220" y1="482" x2="220" y2="538" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="680" y1="482" x2="680" y2="538" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="80" y="544" width="280" height="108" rx="4" fill="#EAF1F4" stroke="#172A36" stroke-width="1.6"/>
  <text x="220" y="578" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="600" letter-spacing="2" fill="#172A36">AYURVEDA</text>
  <text x="220" y="600" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">Charaka Samhita, Sushruta Samhita</text>
  <text x="220" y="618" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11" letter-spacing="1.5" fill="#778187">DEVANAGARI | SANSKRIT ALPHABET</text>
  <text x="220" y="638" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#172A36">~200 BC – AD 200 · COMPILED LATER</text>

  <rect x="540" y="544" width="280" height="108" rx="4" fill="#EAF1F4" stroke="#172A36" stroke-width="1.6"/>
  <text x="680" y="578" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="600" letter-spacing="2" fill="#172A36">SEFER ASAPH</text>
  <text x="680" y="600" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">Oldest surviving Hebrew medical text</text>
  <text x="680" y="618" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11" letter-spacing="1.5" fill="#778187">PALEO-HEBREW | ANCIENT HEBREW</text>
  <text x="680" y="638" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#172A36">AD 300–700 · MEDIEVAL COMPILATION</text>

  <line x1="220" y1="652" x2="220" y2="698" stroke="#778187" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="680" y1="652" x2="680" y2="698" stroke="#778187" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="220" y1="698" x2="680" y2="698" stroke="#778187" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="450" y1="698" x2="450" y2="720" stroke="#778187" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arr)"/>

  <rect x="240" y="726" width="420" height="58" rx="4" fill="#FFFFFF" stroke="#778187" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="450" y="750" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="13" font-weight="500" fill="#0E0E0E">Shared fingerprints survive in both streams</text>
  <text x="450" y="770" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11.5" fill="#47545B">Elemental humours, thermal plant energetics, Haritaki, the physician's oath</text>
</svg>
