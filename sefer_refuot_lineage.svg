<svg width="100%" viewBox="0 0 900 760" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Transmission of Noah's Book of Remedies</title>
  <desc>Flow diagram showing the Sefer Refuot passing through the Tower of Babel dispersion into Ayurveda in India, and through the lineage of Shem into the Hebrew Sefer Asaph.</desc>
  <rect width="900" height="760" fill="#FFFFFF"/>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L8 4.5 L0 9 Z" fill="#172A36"/>
    </marker>
  </defs>

  <!-- top box: Sefer Refuot -->
  <rect x="280" y="40" width="340" height="92" rx="4" fill="#EAF1F4" stroke="#172A36" stroke-width="1.6"/>
  <text x="450" y="78" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="21" font-weight="600" letter-spacing="2" fill="#172A36">SEFER REFUOT</text>
  <text x="450" y="103" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12.5" fill="#47545B">Noah's Book of Remedies, taught by the angel Raphael</text>
  <text x="450" y="121" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11" letter-spacing="1.5" fill="#778187">JUBILEES 10:1014</text>

  <!-- connector down to split -->
  <line x1="450" y1="132" x2="450" y2="180" stroke="#172A36" stroke-width="1.6"/>
  <line x1="220" y1="180" x2="680" y2="180" stroke="#172A36" stroke-width="1.6"/>
  <line x1="220" y1="180" x2="220" y2="222" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="680" y1="180" x2="680" y2="222" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- left branch: Babel -->
  <rect x="80" y="228" width="280" height="84" rx="4" fill="#FFFFFF" stroke="#172A36" stroke-width="1.3"/>
  <text x="220" y="262" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="1.5" fill="#0E0E0E">TOWER OF BABEL</text>
  <text x="220" y="285" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">One language becomes seventy,</text>
  <text x="220" y="302" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">the nations copy what they can carry</text>

  <!-- right branch: Shem -->
  <rect x="540" y="228" width="280" height="84" rx="4" fill="#FFFFFF" stroke="#172A36" stroke-width="1.3"/>
  <text x="680" y="262" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="1.5" fill="#0E0E0E">LINEAGE OF SHEM</text>
  <text x="680" y="285" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">The book given to Noah's eldest son,</text>
  <text x="680" y="302" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">guarded within Israel</text>

  <!-- arrows down -->
  <line x1="220" y1="312" x2="220" y2="368" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="680" y1="312" x2="680" y2="368" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- left middle: sages of India -->
  <rect x="80" y="374" width="280" height="72" rx="4" fill="#FFFFFF" stroke="#172A36" stroke-width="1.3"/>
  <text x="220" y="404" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="14.5" font-weight="500" fill="#0E0E0E">The sages of India copy it</text>
  <text x="220" y="426" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11.5" fill="#47545B">"and they translated it into their own language"</text>

  <!-- right middle: preserved -->
  <rect x="540" y="374" width="280" height="72" rx="4" fill="#FFFFFF" stroke="#172A36" stroke-width="1.3"/>
  <text x="680" y="404" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="14.5" font-weight="500" fill="#0E0E0E">Copied and recompiled</text>
  <text x="680" y="426" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11.5" fill="#47545B">by physicians in the Hebrew tradition</text>

  <!-- arrows down -->
  <line x1="220" y1="446" x2="220" y2="502" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="680" y1="446" x2="680" y2="502" stroke="#172A36" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- left result: Ayurveda -->
  <rect x="80" y="508" width="280" height="96" rx="4" fill="#EAF1F4" stroke="#172A36" stroke-width="1.6"/>
  <text x="220" y="546" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="600" letter-spacing="2" fill="#172A36">AYURVEDA</text>
  <text x="220" y="570" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">Charaka Samhita, Sushruta Samhita</text>
  <text x="220" y="588" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11" letter-spacing="1.5" fill="#778187">SANSKRIT ADAPTATION</text>

  <!-- right result: Sefer Asaph -->
  <rect x="540" y="508" width="280" height="96" rx="4" fill="#EAF1F4" stroke="#172A36" stroke-width="1.6"/>
  <text x="680" y="546" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="600" letter-spacing="2" fill="#172A36">SEFER ASAPH</text>
  <text x="680" y="570" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" fill="#47545B">Oldest surviving Hebrew medical text</text>
  <text x="680" y="588" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11" letter-spacing="1.5" fill="#778187">HEBREW PRESERVATION</text>

  <!-- bottom convergence note -->
  <line x1="220" y1="604" x2="220" y2="650" stroke="#778187" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="680" y1="604" x2="680" y2="650" stroke="#778187" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="220" y1="650" x2="680" y2="650" stroke="#778187" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="450" y1="650" x2="450" y2="672" stroke="#778187" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arr)"/>

  <rect x="240" y="678" width="420" height="58" rx="4" fill="#FFFFFF" stroke="#778187" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="450" y="702" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="13" font-weight="500" fill="#0E0E0E">Shared fingerprints survive in both streams</text>
  <text x="450" y="722" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11.5" fill="#47545B">Elemental humours, thermal plant energetics, Haritaki, the physician's oath</text>
</svg>
