<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 960 590" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Three-room sacred structure: top view compared</title>
  <desc>Top-down floor plan showing three nested rooms in a Hindu temple campus and in the Mosaic Tabernacle or Solomon's Temple.</desc>
  <rect width="960" height="590" fill="#F7F9F8"/>

  <text x="480" y="38" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="2" fill="#172A36">THREE ROOMS | TOP VIEW | SAME SKELETON</text>
  <line x1="480" y1="50" x2="480" y2="500" stroke="#172A36" stroke-width="1" opacity="0.12"/>

  <text x="240" y="74" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="1.5" fill="#172A36">HINDU TEMPLE CAMPUS</text>
  <text x="240" y="92" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="9" letter-spacing="1" fill="#778187">PRAKARA | MANDAPA | GARBHAGRIHA</text>
  <text x="240" y="108" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1" fill="#172A36">VEDIC ROOTS ~1600 BC · TEMPLE FORMS LATER</text>

  <rect x="44" y="120" width="392" height="360" rx="8" fill="#FFFFFF" stroke="#172A36" stroke-width="1.6"/>
  <text x="240" y="146" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="600" fill="#778187">ROOM 1 | OUTER</text>
  <text x="240" y="166" text-anchor="middle" font-family="Noto Sans Devanagari, Poppins, sans-serif" font-size="15" fill="#47545B">&#x092A;&#x094D;&#x0930;&#x093E;&#x0915;&#x093E;&#x0930;</text>
  <text x="240" y="184" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="9" fill="#778187">devotees, circumambulation, public worship</text>

  <rect x="94" y="218" width="292" height="190" rx="6" fill="#EAF1F4" stroke="#172A36" stroke-width="1.3"/>
  <text x="240" y="244" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="600" fill="#778187">ROOM 2 | MIDDLE</text>
  <text x="240" y="266" text-anchor="middle" font-family="Noto Sans Devanagari, Poppins, sans-serif" font-size="15" fill="#47545B">&#x092E;&#x0923;&#x094D;&#x0921;&#x092A;</text>
  <text x="240" y="284" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="9" fill="#778187">priests, music, secondary rites</text>

  <rect x="164" y="308" width="152" height="100" rx="4" fill="#172A36" stroke="#172A36" stroke-width="1.3"/>
  <text x="240" y="336" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="600" fill="#EAF1F4">ROOM 3 | INNER</text>
  <text x="240" y="358" text-anchor="middle" font-family="Noto Sans Devanagari, Poppins, sans-serif" font-size="16" fill="#FFFFFF">&#x0917;&#x0930;&#x094D;&#x092D;&#x0917;&#x0943;&#x0939;</text>
  <text x="240" y="380" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="8" fill="#EAF1F4">one pujari | murti visible</text>

  <text x="720" y="74" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="1.5" fill="#172A36">TABERNACLE | SOLOMON'S TEMPLE</text>
  <text x="720" y="92" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="9" letter-spacing="1" fill="#778187">OUTER COURT | HOLY PLACE | HOLY OF HOLIES</text>
  <text x="720" y="108" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1" fill="#172A36">TABERNACLE ~1400 BC · SOLOMON ~966 BC</text>

  <rect x="524" y="120" width="392" height="360" rx="8" fill="#FFFFFF" stroke="#172A36" stroke-width="1.6"/>
  <text x="720" y="146" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="600" fill="#778187">ROOM 1 | OUTER</text>
  <text x="720" y="166" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="14" fill="#47545B">&#x05D7;&#x05E6;&#x05E8;</text>
  <text x="720" y="184" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="9" fill="#778187">altar, laver, all Israel</text>

  <rect x="574" y="218" width="292" height="190" rx="6" fill="#EAF1F4" stroke="#172A36" stroke-width="1.3"/>
  <text x="720" y="244" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="600" fill="#778187">ROOM 2 | MIDDLE</text>
  <text x="720" y="266" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="14" fill="#47545B">&#x05D4;&#x05D9;&#x05DB;&#x05DC;</text>
  <text x="720" y="284" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="9" fill="#778187">menorah, bread, incense</text>

  <line x1="644" y1="308" x2="796" y2="308" stroke="#172A36" stroke-width="2" stroke-dasharray="5 4" opacity="0.75"/>
  <text x="808" y="312" font-family="Poppins, Arial, sans-serif" font-size="8" fill="#778187">veil</text>

  <rect x="644" y="318" width="152" height="90" rx="4" fill="#172A36" stroke="#172A36" stroke-width="1.3"/>
  <text x="720" y="344" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="600" fill="#EAF1F4">ROOM 3 | INNER</text>
  <text x="720" y="364" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" fill="#FFFFFF">&#x05E7;&#x05D3;&#x05E9; &#x05D4;&#x05E7;&#x05D3;&#x05E9;&#x05D9;&#x05DD;</text>
  <text x="720" y="384" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="8" fill="#EAF1F4">Ark | no image | God unseen</text>

  <g stroke="#778187" stroke-width="1.4" fill="#778187" opacity="0.6">
    <path d="M240 498 L240 460 M232 468 L240 460 L248 468"/>
    <path d="M720 498 L720 460 M712 468 L720 460 L728 468"/>
  </g>
  <text x="240" y="522" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="9" fill="#778187">worship moves inward</text>
  <text x="720" y="522" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="9" fill="#778187">worship moves inward</text>

  <text x="480" y="556" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="1.5" fill="#172A36">OUTER TO MIDDLE TO INNER | THREE ROOMS IN BOTH TRADITIONS</text>
  <text x="480" y="576" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="9.5" font-weight="600" letter-spacing="1" fill="#778187">HEBREW WORSHIP GIVEN AT SINAI ~1400 BC · HINDU TEMPLE GRAMMAR DEVELOPED LATER</text>
</svg>
