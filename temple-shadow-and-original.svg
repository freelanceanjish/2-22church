<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" role="img">
  <title>Man and shadow: original form and its echo</title>
  <rect width="800" height="400" fill="#FFFFFF"/>
  <rect x="16" y="16" width="768" height="368" rx="10" fill="#EEF4F7" stroke="#172A36" stroke-width="2"/>

  <text x="400" y="48" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" letter-spacing="0.14em" fill="#172A36">CELEBRATING THE SHADOWS | TRACING THE ROOTS</text>
  <text x="400" y="70" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#47545B">The man is the source | The shadow is the echo</text>

  <!-- Ground line -->
  <line x1="80" y1="300" x2="720" y2="300" stroke="#172A36" stroke-width="2" opacity="0.35"/>

  <!-- Light source (subtle) -->
  <circle cx="640" cy="110" r="28" fill="rgba(23,42,54,0.08)" stroke="#172A36" stroke-width="1.5"/>
  <line x1="612" y1="132" x2="520" y2="220" stroke="#172A36" stroke-width="1" opacity="0.2" stroke-dasharray="4 6"/>
  <text x="640" y="114" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#172A36">LIGHT</text>

  <!-- Shadow (echo) - stretched, dashed, lighter -->
  <g opacity="0.38" stroke="#172A36" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6 5">
    <!-- head -->
    <circle cx="268" cy="198" r="18"/>
    <!-- body -->
    <line x1="268" y1="216" x2="268" y2="272"/>
    <!-- arms -->
    <line x1="268" y1="238" x2="242" y2="258"/>
    <line x1="268" y1="238" x2="294" y2="258"/>
    <!-- legs -->
    <line x1="268" y1="272" x2="248" y2="300"/>
    <line x1="268" y1="272" x2="288" y2="300"/>
  </g>
  <text x="268" y="330" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" letter-spacing="0.1em" fill="#778187">SHADOW</text>
  <text x="268" y="346" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#778187">later form | echo | fragment</text>

  <!-- Man (original) - solid -->
  <g stroke="#172A36" stroke-width="3" fill="#172A36" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="500" cy="168" r="22" fill="#172A36"/>
    <line x1="500" y1="190" x2="500" y2="258" stroke-width="3.5"/>
    <line x1="500" y1="214" x2="468" y2="240"/>
    <line x1="500" y1="214" x2="532" y2="240"/>
    <line x1="500" y1="258" x2="476" y2="300" stroke-width="3.5"/>
    <line x1="500" y1="258" x2="524" y2="300" stroke-width="3.5"/>
  </g>
  <text x="500" y="330" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" letter-spacing="0.1em" fill="#172A36">MAN</text>
  <text x="500" y="346" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">original | given | root pattern</text>

  <!-- Connection -->
  <path d="M330 250 C360 250 390 230 420 210" fill="none" stroke="#172A36" stroke-width="1.5" opacity="0.3" stroke-dasharray="3 5"/>
  <text x="400" y="248" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="700" letter-spacing="0.1em" fill="#172A36">TRACE BACK</text>

  <line x1="120" y1="372" x2="680" y2="372" stroke="#172A36" stroke-width="1" opacity="0.2"/>
  <text x="400" y="388" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-style="italic" fill="#47545B">Every shadow argues there was a man standing in the light first</text>
</svg>
