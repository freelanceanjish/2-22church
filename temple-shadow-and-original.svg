<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320" role="img">
  <title>Shadow and original: tracing the roots of temple worship</title>
  <rect width="720" height="320" fill="#EEF4F7"/>
  <text x="360" y="32" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" letter-spacing="0.14em" fill="#172A36">CELEBRATING THE SHADOWS À TRACING THE ROOTS</text>
  <text x="360" y="52" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" letter-spacing="0.08em" fill="#778187">Form in outline À Form in source</text>

  <!-- Shadow (echo) -->
  <text x="200" y="88" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" letter-spacing="0.12em" fill="#778187">SHADOW</text>
  <text x="200" y="102" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#778187">echo À fragment À later form</text>
  <g opacity="0.42" stroke="#172A36" stroke-width="1.4" fill="none" stroke-dasharray="5 4">
    <rect x="118" y="118" width="164" height="118" rx="4"/>
    <rect x="148" y="148" width="104" height="72" rx="2"/>
    <rect x="178" y="172" width="44" height="36" rx="1"/>
    <path d="M200 236 L200 252 M188 252 L212 252"/>
    <circle cx="200" cy="112" r="10" fill="rgba(23,42,54,0.06)" stroke="#172A36" stroke-width="1"/>
  </g>

  <!-- Arrow -->
  <path d="M290 188 L330 188" stroke="#172A36" stroke-width="1" opacity="0.35" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#172A36" opacity="0.45"/>
    </marker>
  </defs>
  <text x="360" y="182" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" letter-spacing="0.1em" fill="#47545B">TRACE BACK</text>

  <!-- Original (source) -->
  <text x="520" y="88" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" letter-spacing="0.12em" fill="#172A36">ORIGINAL</text>
  <text x="520" y="102" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">given À Sinai À root pattern</text>
  <g fill="#172A36" stroke="#172A36" stroke-width="1.2">
    <rect x="438" y="118" width="164" height="118" rx="4" fill="none" opacity="0.35"/>
    <rect x="468" y="148" width="104" height="72" rx="2" fill="rgba(23,42,54,0.1)" stroke="#172A36"/>
    <rect x="498" y="172" width="44" height="36" rx="1"/>
    <path d="M520 236 L520 252 M508 252 L532 252" fill="none"/>
    <circle cx="520" cy="112" r="10" fill="#172A36"/>
    <text x="520" y="115" text-anchor="middle" font-size="7" fill="#EEF4F7" font-family="Arial,Helvetica,sans-serif">&</text>
  </g>

  <text x="200" y="278" text-anchor="middle" font-family="'Noto Sans Devanagari', 'Arial Unicode MS', sans-serif" font-size="10" fill="#47545B">*0M&> À /M À 8M(>(</text>
  <text x="520" y="278" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#172A36">Parochet À Olah À Mikveh</text>
  <line x1="120" y1="292" x2="600" y2="292" stroke="#172A36" stroke-width="0.5" opacity="0.2"/>
  <text x="360" y="308" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" font-style="italic" fill="#778187">the shadow preserves the shape À the original reveals the Giver</text>
</svg>
