<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="0 0 800 360" role="img">
  <title>Shadow and original: tracing the roots of temple worship</title>
  <rect width="800" height="360" fill="#FFFFFF"/>
  <rect x="12" y="12" width="776" height="336" rx="8" fill="#EEF4F7" stroke="#172A36" stroke-width="2"/>
  <text x="400" y="44" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="700" letter-spacing="0.14em" fill="#172A36">CELEBRATING THE SHADOWS | TRACING THE ROOTS</text>
  <text x="400" y="66" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" letter-spacing="0.08em" fill="#47545B">Form in outline | Form in source</text>

  <text x="220" y="104" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#172A36">SHADOW</text>
  <text x="220" y="122" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#47545B">echo | fragment | later form</text>
  <g stroke="#172A36" stroke-width="2" fill="none">
    <rect x="128" y="138" width="184" height="132" rx="6" stroke-dasharray="7 5" opacity="0.75"/>
    <rect x="158" y="168" width="124" height="82" rx="3" stroke-dasharray="7 5" opacity="0.75"/>
    <rect x="188" y="194" width="64" height="44" rx="2" stroke-dasharray="7 5" opacity="0.75"/>
    <line x1="220" y1="270" x2="220" y2="292" opacity="0.75"/>
    <line x1="206" y1="292" x2="234" y2="292" opacity="0.75"/>
    <circle cx="220" cy="126" r="12" fill="rgba(23,42,54,0.08)" stroke="#172A36" stroke-width="1.5"/>
  </g>

  <line x1="318" y1="210" x2="368" y2="210" stroke="#172A36" stroke-width="2"/>
  <polygon points="368,206 378,210 368,214" fill="#172A36"/>
  <text x="400" y="204" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" letter-spacing="0.12em" fill="#172A36">TRACE BACK</text>

  <text x="580" y="104" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#172A36">ORIGINAL</text>
  <text x="580" y="122" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#47545B">given | Sinai | root pattern</text>
  <g fill="#172A36" stroke="#172A36" stroke-width="2">
    <rect x="488" y="138" width="184" height="132" rx="6" fill="none"/>
    <rect x="518" y="168" width="124" height="82" rx="3" fill="rgba(23,42,54,0.14)"/>
    <rect x="548" y="194" width="64" height="44" rx="2"/>
    <line x1="580" y1="270" x2="580" y2="292" fill="none"/>
    <line x1="566" y1="292" x2="594" y2="292" fill="none"/>
    <circle cx="580" cy="126" r="12" fill="#172A36"/>
  </g>

  <text x="220" y="318" text-anchor="middle" font-family="'Noto Sans Devanagari', 'Arial Unicode MS', sans-serif" font-size="11" fill="#172A36">????? | ???? | ?????</text>
  <text x="580" y="318" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#172A36">Parochet | Olah | Mikveh</text>
  <line x1="140" y1="334" x2="660" y2="334" stroke="#172A36" stroke-width="1" opacity="0.25"/>
  <text x="400" y="350" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-style="italic" fill="#47545B">the shadow preserves the shape | the original reveals the Giver</text>
</svg>
