<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img">
  <title>Ten-fold symmetry: Tabernacle decagon and DNA axial decagon</title>
  <rect width="960" height="420" fill="#FFFFFF"/>
  <rect x="12" y="12" width="936" height="396" rx="8" fill="#EEF4F7" stroke="#172A36" stroke-width="1.5"/>
  <text x="480" y="40" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" letter-spacing="0.1em" fill="#172A36">TEN AS STRUCTURAL GRAMMAR</text>
  <line x1="480" y1="52" x2="480" y2="380" stroke="#172A36" stroke-width="1" opacity="0.2"/>

  <!-- Left: tabernacle decagon top view -->
  <text x="240" y="68" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" fill="#8B6914">TABERNACLE DECAGON (~1400 BC)</text>
  <polygon points="240,100 310,118 328,188 310,258 240,276 170,258 152,188 170,118" fill="rgba(139,105,20,0.1)" stroke="#8B6914" stroke-width="2"/>
  <circle cx="240" cy="188" r="18" fill="none" stroke="#172A36" stroke-width="1"/>
  <text x="240" cy="188" y="192" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#172A36">Ark</text>
  <text x="240" y="300" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">Andrew Hoy · Project314 · yurt dome</text>
  <text x="240" y="314" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">ten-sided dwelling · six stories (model)</text>

  <!-- Right: DNA axial -->
  <text x="720" y="68" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" fill="#5B8DB8">B-DNA AXIAL VIEW</text>
  <polygon points="720,100 790,118 808,188 790,258 720,276 650,258 632,188 650,118" fill="rgba(91,141,184,0.1)" stroke="#5B8DB8" stroke-width="2"/>
  <g stroke="#5B8DB8" stroke-width="1.2" fill="none" opacity="0.7">
    <line x1="720" y1="188" x2="808" y2="188"/>
    <line x1="744" y1="112" x2="696" y2="264"/>
    <line x1="696" y1="112" x2="744" y2="264"/>
  </g>
  <text x="720" y="192" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700" fill="#5B8DB8">10</text>
  <text x="720" y="300" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">10 base pairs · 36° rotation each</text>
  <text x="720" y="314" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">Curtis 1997 · Larsen Symmetry 2021</text>

  <text x="480" y="360" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#172A36">360° ÷ 10 = 36° · π/5 radians · golden-triangle angle</text>
  <text x="480" y="378" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" font-style="italic" fill="#47545B">Sinai precedes the laboratory by more than three millennia</text>
</svg>