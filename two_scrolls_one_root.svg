<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 960 580" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Two manuscript streams, one root</title>
  <desc>A Sanskrit palm-leaf manuscript of the Ayurvedic tradition on the left and a Hebrew biblical scroll on the right, joined beneath by a single shared root system.</desc>
  <rect width="960" height="580" fill="#F7F9F8"/>

  <!-- PPPP LEFT: Sanskrit palm-leaf manuscript (Ayurveda) PPPP -->
  <g>
    <!-- stacked palm leaves -->
    <g>
      <rect x="70" y="118" width="330" height="54" rx="8" fill="#FFFDF6" stroke="#172A36" stroke-width="1.3"/>
      <rect x="78" y="186" width="330" height="54" rx="8" fill="#FFFDF6" stroke="#172A36" stroke-width="1.3"/>
      <rect x="70" y="254" width="330" height="54" rx="8" fill="#FFFDF6" stroke="#172A36" stroke-width="1.3"/>
    </g>
    <!-- binding cord holes -->
    <circle cx="235" cy="145" r="5" fill="none" stroke="#172A36" stroke-width="1.2"/>
    <circle cx="243" cy="213" r="5" fill="none" stroke="#172A36" stroke-width="1.2"/>
    <circle cx="235" cy="281" r="5" fill="none" stroke="#172A36" stroke-width="1.2"/>
    <!-- binding cord -->
    <path d="M235 92 C232 130 246 180 243 213 C240 250 232 262 235 306" fill="none" stroke="#778187" stroke-width="1.4" stroke-dasharray="3 3"/>

    <!-- Devanagari-style writing: short verticals hanging from a headline bar -->
    <g stroke="#47545B" stroke-width="1.6" opacity="0.6" stroke-linecap="round">
      <!-- leaf 1, two text bands left and right of hole -->
      <line x1="92" y1="138" x2="212" y2="138"/>
      <line x1="100" y1="138" x2="100" y2="150"/><line x1="113" y1="138" x2="113" y2="147"/><line x1="127" y1="138" x2="127" y2="151"/><line x1="142" y1="138" x2="142" y2="146"/><line x1="158" y1="138" x2="158" y2="150"/><line x1="171" y1="138" x2="171" y2="147"/><line x1="186" y1="138" x2="186" y2="151"/><line x1="200" y1="138" x2="200" y2="147"/>
      <line x1="92" y1="158" x2="212" y2="158"/>
      <line x1="104" y1="158" x2="104" y2="168"/><line x1="121" y1="158" x2="121" y2="165"/><line x1="138" y1="158" x2="138" y2="169"/><line x1="154" y1="158" x2="154" y2="166"/><line x1="170" y1="158" x2="170" y2="168"/><line x1="188" y1="158" x2="188" y2="165"/>
      <line x1="258" y1="138" x2="382" y2="138"/>
      <line x1="266" y1="138" x2="266" y2="149"/><line x1="280" y1="138" x2="280" y2="146"/><line x1="296" y1="138" x2="296" y2="151"/><line x1="311" y1="138" x2="311" y2="147"/><line x1="327" y1="138" x2="327" y2="150"/><line x1="343" y1="138" x2="343" y2="146"/><line x1="359" y1="138" x2="359" y2="150"/><line x1="372" y1="138" x2="372" y2="147"/>
      <line x1="258" y1="158" x2="382" y2="158"/>
      <line x1="270" y1="158" x2="270" y2="167"/><line x1="287" y1="158" x2="287" y2="166"/><line x1="304" y1="158" x2="304" y2="169"/><line x1="322" y1="158" x2="322" y2="165"/><line x1="340" y1="158" x2="340" y2="168"/><line x1="358" y1="158" x2="358" y2="166"/>
      <!-- leaf 2 -->
      <line x1="100" y1="206" x2="220" y2="206"/>
      <line x1="108" y1="206" x2="108" y2="217"/><line x1="123" y1="206" x2="123" y2="214"/><line x1="139" y1="206" x2="139" y2="218"/><line x1="155" y1="206" x2="155" y2="213"/><line x1="172" y1="206" x2="172" y2="217"/><line x1="189" y1="206" x2="189" y2="214"/><line x1="206" y1="206" x2="206" y2="217"/>
      <line x1="100" y1="226" x2="220" y2="226"/>
      <line x1="112" y1="226" x2="112" y2="235"/><line x1="130" y1="226" x2="130" y2="233"/><line x1="148" y1="226" x2="148" y2="236"/><line x1="166" y1="226" x2="166" y2="233"/><line x1="184" y1="226" x2="184" y2="235"/><line x1="202" y1="226" x2="202" y2="233"/>
      <line x1="266" y1="206" x2="390" y2="206"/>
      <line x1="274" y1="206" x2="274" y2="216"/><line x1="290" y1="206" x2="290" y2="213"/><line x1="306" y1="206" x2="306" y2="218"/><line x1="323" y1="206" x2="323" y2="214"/><line x1="340" y1="206" x2="340" y2="217"/><line x1="357" y1="206" x2="357" y2="213"/><line x1="374" y1="206" x2="374" y2="217"/>
      <line x1="266" y1="226" x2="390" y2="226"/>
      <line x1="278" y1="226" x2="278" y2="234"/><line x1="296" y1="226" x2="296" y2="233"/><line x1="314" y1="226" x2="314" y2="236"/><line x1="332" y1="226" x2="332" y2="233"/><line x1="350" y1="226" x2="350" y2="235"/><line x1="368" y1="226" x2="368" y2="233"/>
      <!-- leaf 3 -->
      <line x1="92" y1="274" x2="212" y2="274"/>
      <line x1="100" y1="274" x2="100" y2="285"/><line x1="116" y1="274" x2="116" y2="282"/><line x1="132" y1="274" x2="132" y2="286"/><line x1="149" y1="274" x2="149" y2="281"/><line x1="166" y1="274" x2="166" y2="285"/><line x1="183" y1="274" x2="183" y2="282"/><line x1="199" y1="274" x2="199" y2="285"/>
      <line x1="92" y1="294" x2="212" y2="294"/>
      <line x1="105" y1="294" x2="105" y2="302"/><line x1="124" y1="294" x2="124" y2="301"/><line x1="143" y1="294" x2="143" y2="303"/><line x1="161" y1="294" x2="161" y2="301"/><line x1="179" y1="294" x2="179" y2="302"/><line x1="197" y1="294" x2="197" y2="301"/>
      <line x1="258" y1="274" x2="382" y2="274"/>
      <line x1="266" y1="274" x2="266" y2="284"/><line x1="282" y1="274" x2="282" y2="281"/><line x1="298" y1="274" x2="298" y2="286"/><line x1="315" y1="274" x2="315" y2="282"/><line x1="332" y1="274" x2="332" y2="285"/><line x1="349" y1="274" x2="349" y2="281"/><line x1="366" y1="274" x2="366" y2="285"/>
      <line x1="258" y1="294" x2="382" y2="294"/>
      <line x1="270" y1="294" x2="270" y2="302"/><line x1="288" y1="294" x2="288" y2="301"/><line x1="306" y1="294" x2="306" y2="303"/><line x1="324" y1="294" x2="324" y2="301"/><line x1="342" y1="294" x2="342" y2="302"/><line x1="360" y1="294" x2="360" y2="301"/>
    </g>

    <!-- lotus motif above the leaves -->
    <g stroke="#172A36" stroke-width="1.5" fill="#EAF1F4">
      <path d="M235 70 C229 56 229 46 235 36 C241 46 241 56 235 70 Z"/>
      <path d="M235 70 C223 62 215 54 213 42 C226 46 233 56 235 70 Z"/>
      <path d="M235 70 C247 62 255 54 257 42 C244 46 237 56 235 70 Z"/>
      <path d="M235 70 C217 68 207 62 201 52 C215 52 227 60 235 70 Z"/>
      <path d="M235 70 C253 68 263 62 269 52 C255 52 243 60 235 70 Z"/>
    </g>

    <!-- Devanagari sample on palm leaf -->
    <text x="235" y="148" text-anchor="middle" font-family="Noto Sans Devanagari, Poppins, Arial, sans-serif" font-size="15" fill="#47545B" opacity="0.72">चरक संहिता</text>
    <text x="235" y="218" text-anchor="middle" font-family="Noto Sans Devanagari, Poppins, Arial, sans-serif" font-size="13" fill="#47545B" opacity="0.58">आयुर्वेद</text>
    <text x="235" y="286" text-anchor="middle" font-family="Noto Sans Devanagari, Poppins, Arial, sans-serif" font-size="12" fill="#47545B" opacity="0.52">देवनागरी</text>

    <text x="235" y="345" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="13" letter-spacing="4" fill="#47545B">CHARAKA SAMHITA</text>
    <text x="235" y="365" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" letter-spacing="2.5" fill="#778187">DEVANAGARI · SANSKRIT ALPHABET</text>
    <text x="235" y="384" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1.2" fill="#172A36">~200 BC – AD 200 · COMPILED LATER</text>
  </g>

  <!-- PPPP RIGHT: Hebrew biblical scroll PPPP -->
  <g>
    <!-- scroll parchment -->
    <rect x="585" y="100" width="280" height="210" rx="4" fill="#FFFDF6" stroke="#172A36" stroke-width="1.3"/>
    <!-- rollers (etz chaim) -->
    <rect x="561" y="86" width="24" height="238" rx="12" fill="#EAF1F4" stroke="#172A36" stroke-width="1.3"/>
    <rect x="865" y="86" width="24" height="238" rx="12" fill="#EAF1F4" stroke="#172A36" stroke-width="1.3"/>
    <circle cx="573" cy="86" r="8" fill="#172A36"/>
    <circle cx="573" cy="324" r="8" fill="#172A36"/>
    <circle cx="877" cy="86" r="8" fill="#172A36"/>
    <circle cx="877" cy="324" r="8" fill="#172A36"/>

    <!-- Hebrew-style writing: blocky marks, right to left, ragged left edge -->
    <g stroke="#47545B" stroke-width="2.4" opacity="0.6" stroke-linecap="butt">
      <line x1="845" y1="135" x2="625" y2="135"/>
      <line x1="845" y1="159" x2="648" y2="159"/>
      <line x1="845" y1="183" x2="618" y2="183"/>
      <line x1="845" y1="207" x2="660" y2="207"/>
      <line x1="845" y1="231" x2="630" y2="231"/>
      <line x1="845" y1="255" x2="642" y2="255"/>
      <line x1="845" y1="279" x2="655" y2="279"/>
    </g>
    <!-- letter breaks to suggest words -->
    <g stroke="#FFFDF6" stroke-width="2.6">
      <line x1="800" y1="133" x2="800" y2="137"/><line x1="752" y1="133" x2="752" y2="137"/><line x1="700" y1="133" x2="700" y2="137"/><line x1="664" y1="133" x2="664" y2="137"/>
      <line x1="812" y1="157" x2="812" y2="161"/><line x1="764" y1="157" x2="764" y2="161"/><line x1="716" y1="157" x2="716" y2="161"/><line x1="680" y1="157" x2="680" y2="161"/>
      <line x1="790" y1="181" x2="790" y2="185"/><line x1="740" y1="181" x2="740" y2="185"/><line x1="690" y1="181" x2="690" y2="185"/><line x1="650" y1="181" x2="650" y2="185"/>
      <line x1="806" y1="205" x2="806" y2="209"/><line x1="756" y1="205" x2="756" y2="209"/><line x1="710" y1="205" x2="710" y2="209"/>
      <line x1="796" y1="229" x2="796" y2="233"/><line x1="746" y1="229" x2="746" y2="233"/><line x1="694" y1="229" x2="694" y2="233"/><line x1="658" y1="229" x2="658" y2="233"/>
      <line x1="810" y1="253" x2="810" y2="257"/><line x1="760" y1="253" x2="760" y2="257"/><line x1="708" y1="253" x2="708" y2="257"/>
      <line x1="788" y1="277" x2="788" y2="281"/><line x1="738" y1="277" x2="738" y2="281"/><line x1="692" y1="277" x2="692" y2="281"/>
    </g>

    <!-- Paleo-Hebrew sample on scroll (ketav ivri) -->
    <text x="725" y="175" text-anchor="middle" font-family="Noto Sans Phoenician, serif" font-size="20" fill="#47545B" opacity="0.72">𐤎𐤐𐤓 𐤓𐤐𐤀𐤅𐤕</text>
    <text x="725" y="248" text-anchor="middle" font-family="Noto Sans Phoenician, serif" font-size="14" fill="#47545B" opacity="0.55">𐤎𐤐𐤓 𐤀𐤔𐤐</text>

    <text x="725" y="345" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="13" letter-spacing="4" fill="#47545B">SEFER REFUOT</text>
    <text x="725" y="362" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" letter-spacing="2" fill="#778187">BOOK OF MEDICINES</text>
    <text x="725" y="378" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="9" letter-spacing="1.5" fill="#778187">PALEO-HEBREW · ANCIENT HEBREW</text>
    <text x="725" y="396" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1.2" fill="#172A36">~2400 BC · POST-FLOOD · SHEM LINE</text>
  </g>

  <!-- PPPP SHARED ROOT beneath both PPPP -->
  <g stroke="#172A36" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- taproot rising at centre -->
    <path d="M480 505 C480 470 480 440 480 415"/>
    <!-- root spreading to each manuscript -->
    <path d="M480 440 C390 432 310 415 235 382"/>
    <path d="M480 440 C570 432 650 415 725 382"/>
    <!-- fine rootlets -->
    <path d="M480 480 C440 478 410 470 385 458" stroke-width="1.2" opacity="0.6"/>
    <path d="M480 480 C520 478 550 470 575 458" stroke-width="1.2" opacity="0.6"/>
    <path d="M480 505 C460 510 445 518 436 528" stroke-width="1.2" opacity="0.6"/>
    <path d="M480 505 C500 510 515 518 524 528" stroke-width="1.2" opacity="0.6"/>
  </g>
  <!-- seed bulb at the root base -->
  <ellipse cx="480" cy="412" rx="13" ry="17" fill="#EAF1F4" stroke="#172A36" stroke-width="2"/>
  <circle cx="480" cy="412" r="4.5" fill="#172A36"/>

  <text x="480" y="538" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1.5" fill="#172A36">ONE ROOT · NOAH'S BOOK · POST-FLOOD ~2400 BC</text>
  <text x="480" y="562" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="12" letter-spacing="5" fill="#47545B">TWO STREAMS, ONE ROOT</text>
</svg>
