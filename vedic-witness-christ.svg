<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" role="img" aria-labelledby="title desc">
  <title id="title">Vedic witness to Christ</title>
  <desc id="desc">Manuscript and a bold Latin cross with Isha Masih in Devanagari.</desc>

  <rect width="720" height="400" fill="#EEF4F7"/>

  <!-- Manuscript -->
  <g fill="#FFFFFF" stroke="#172A36" stroke-width="2">
    <rect x="72" y="64" width="280" height="272" rx="4"/>
  </g>
  <g stroke="#172A36" stroke-width="1.5" opacity="0.3">
    <line x1="100" y1="112" x2="324" y2="112"/>
    <line x1="100" y1="152" x2="300" y2="152"/>
    <line x1="100" y1="192" x2="312" y2="192"/>
    <line x1="100" y1="232" x2="276" y2="232"/>
  </g>

  <!-- Latin cross: three pieces (short top + crossbar + long bottom) — never a plus -->
  <g fill="#172A36">
    <!-- Top of stem (short, above crossbar) -->
    <rect x="508" y="76" width="24" height="38" rx="1"/>
    <!-- Crossbar (narrow, high on the stem) -->
    <rect x="462" y="114" width="116" height="22" rx="1"/>
    <!-- Bottom of stem (long, below crossbar) -->
    <rect x="508" y="136" width="24" height="188" rx="1"/>
  </g>

  <text x="212" y="248" text-anchor="middle" font-size="46" font-weight="500" fill="#172A36">&#x908;&#x936; &#x92E;&#x938;&#x940;&#x939;</text>
  <text x="212" y="290" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="0.2em" fill="#47545B">ISA MASIH</text>
  <text x="520" y="360" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#172A36">Vedic witness to Christ</text>
</svg>
