<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="340" viewBox="0 0 680 340" role="img">
  <title>Lunar-solar drift and leap month correction</title>
  <rect width="680" height="340" fill="#EEF4F7"/>
  
  <text x="340" y="24" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em" fill="#172A36">LUNI-SOLAR DRIFT (WHY A 13TH MONTH EXISTS)</text>
  <text x="340" y="42" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">12 lunar months ≈ 354 days · solar year ≈ 365 days · gap ≈ 11 days per year</text>
  <rect x="60" y="70" width="560" height="36" rx="4" fill="#FFF" stroke="#172A36" stroke-width="1"/>
  <rect x="60" y="70" width="420" height="36" rx="4" fill="rgba(23,42,54,0.12)"/>
  <text x="80" y="93" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#172A36">Solar year (seasons / festivals)</text>
  <text x="500" y="93" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#172A36">365 d</text>
  <rect x="60" y="120" width="560" height="36" rx="4" fill="#FFF" stroke="#172A36" stroke-width="1"/>
  <rect x="60" y="120" width="408" height="36" rx="4" fill="rgba(23,42,54,0.08)"/>
  <text x="80" y="143" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#172A36">12 lunar months (Molad / Chandramana)</text>
  <text x="500" y="143" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#172A36">354 d</text>
  <path d="M 340 170 L 340 200" stroke="#2A4A5E" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2A4A5E"/></marker></defs>
  <rect x="220" y="205" width="240" height="52" rx="6" fill="#172A36"/>
  <text x="340" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="600" fill="#FFFFFF">~11 day drift each year</text>
  <text x="340" y="244" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#A8C4DC">Corrected by leap month · not a 13th sign</text>
  <text x="120" y="285" font-family="'Noto Sans Devanagari', 'Arial Unicode MS', sans-serif" font-size="10" fill="#172A36">अधिक मास</text>
  <text x="120" y="300" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">Adhika Masa (Vedic)</text>
  <text x="120" y="316" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="700" fill="#172A36">CLASSICAL JYOTISH · CENTURIES BC–AD</text>
  <text x="480" y="285" font-family="'Noto Sans Devanagari', 'Arial Unicode MS', sans-serif" font-size="10" fill="#172A36">אדר א׳</text>
  <text x="480" y="300" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">Adar I (Jewish)</text>
  <text x="480" y="316" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="700" fill="#172A36">EXODUS ROOT ~1400 BC · RABBINIC MATURITY LATER</text>

</svg>
