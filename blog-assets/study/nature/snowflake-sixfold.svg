<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Snowflake with six-fold radial symmetry">
  <rect width="480" height="360" fill="#f8faf9"/>
  <g stroke="#5b8db8" stroke-width="2" fill="none" transform="translate(240,190)">
    <line x1="0" y1="-95" x2="0" y2="95"/>
    <line x1="-82" y1="-47" x2="82" y2="47"/>
    <line x1="-82" y1="47" x2="82" y2="-47"/>
    <g transform="rotate(30)"><line x1="0" y1="-95" x2="0" y2="95"/></g>
    <g transform="rotate(60)"><line x1="0" y1="-95" x2="0" y2="95"/></g>
    <g transform="rotate(120)"><line x1="0" y1="-95" x2="0" y2="95"/></g>
  </g>
  <circle cx="240" cy="190" r="8" fill="#172A36"/>
  <text x="24" y="32" font-family="Poppins,Arial,sans-serif" font-size="13" fill="#47545B">Snowflake - 6-fold symmetry</text>
</svg>
