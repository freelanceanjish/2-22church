<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-label="Graded sanctity Hindu temple and Hebrew Tabernacle">
  <rect width="720" height="420" fill="#EEF4F7"/>
  <text x="180" y="36" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" letter-spacing="0.18em" fill="#172A36">VEDIC / HINDU TEMPLE</text>
  <circle cx="180" cy="220" r="148" fill="none" stroke="#172A36" stroke-width="1.5" opacity="0.35"/>
  <circle cx="180" cy="220" r="98" fill="rgba(23,42,54,0.06)" stroke="#172A36" stroke-width="1.5"/>
  <circle cx="180" cy="220" r="48" fill="#172A36"/>
  <text x="180" y="88" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#47545B">Outer campus - all devotees</text>
  <text x="180" y="168" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#47545B">Mandapa - priests</text>
  <text x="180" y="224" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="600" fill="#FFFFFF">Garbhagriha</text>
  <text x="180" y="238" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#EAF1F4">womb chamber</text>
  <text x="540" y="36" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" letter-spacing="0.18em" fill="#172A36">HEBREW TABERNACLE / TEMPLE</text>
  <rect x="392" y="72" width="296" height="296" fill="none" stroke="#172A36" stroke-width="1.5" opacity="0.35"/>
  <rect x="432" y="112" width="216" height="216" fill="rgba(23,42,54,0.06)" stroke="#172A36" stroke-width="1.5"/>
  <rect x="492" y="172" width="96" height="96" fill="#172A36"/>
  <text x="540" y="88" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#47545B">Outer Court - sacrifices</text>
  <text x="540" y="168" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#47545B">Holy Place (Kodesh)</text>
  <text x="540" y="218" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="600" fill="#FFFFFF">Holy of Holies</text>
  <text x="540" y="232" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#EAF1F4">Ark and veil</text>
  <path d="M318 210 L352 210" stroke="#172A36" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#172A36"/>
    </marker>
  </defs>
  <text x="335" y="198" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="600" fill="#172A36">same</text>
  <text x="335" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="600" fill="#172A36">pattern</text>
  <text x="360" y="398" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="500" fill="#172A36">Concentric zones of increasing holiness</text>
</svg>
