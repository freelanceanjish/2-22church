<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="320" viewBox="0 0 680 320" role="img">
  <title>Moon primacy in Vedic and Jewish calendars</title>
  <rect width="680" height="320" fill="#EEF4F7"/>
  
  <text x="340" y="24" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em" fill="#172A36">MOON BEFORE SUN (BOTH TRADITIONS)</text>
  <text x="340" y="42" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">Western horoscope emphasises Sun sign · Vedic &amp; Hebrew calendars centre the Moon</text>
  <circle cx="170" cy="155" r="48" fill="rgba(23,42,54,0.08)" stroke="#172A36" stroke-width="1.2"/>
  <circle cx="155" cy="140" r="22" fill="#D8E4EC" stroke="#172A36" stroke-width="0.8"/>
  <text x="170" y="220" text-anchor="middle" font-family="'Noto Sans Devanagari', 'Arial Unicode MS', sans-serif" font-size="11" fill="#172A36">जन्म राशि</text>
  <text x="170" y="238" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">Janma Rashi · Moon sign</text>
  <text x="170" y="256" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#47545B">Nakshatra · lunar mansion</text>
  <text x="170" y="274" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="700" fill="#172A36">CLASSICAL JYOTISH · CENTURIES BC–AD</text>
  <circle cx="510" cy="155" r="48" fill="rgba(23,42,54,0.08)" stroke="#172A36" stroke-width="1.2"/>
  <circle cx="495" cy="140" r="22" fill="#D8E4EC" stroke="#172A36" stroke-width="0.8"/>
  <text x="510" y="220" text-anchor="middle" font-family="'Noto Sans Devanagari', 'Arial Unicode MS', sans-serif" font-size="11" fill="#172A36">ראש חודש</text>
  <text x="510" y="238" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">Rosh Chodesh · new moon</text>
  <text x="510" y="256" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7" fill="#47545B">Molad · festival rhythm</text>
  <text x="510" y="274" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="700" fill="#172A36">EXODUS CALENDAR ~1400 BC</text>
  <text x="340" y="304" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" fill="#47545B">Renewal, seasons, and identity tied to lunar light</text>

</svg>
